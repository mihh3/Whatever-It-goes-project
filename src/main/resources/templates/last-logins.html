<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Logins</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css" rel="stylesheet">
    <!-- DataTables -->
    <link href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #141e30, #243b55);
            min-height: 100vh;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-transparent {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            backdrop-filter: blur(10px);
            width: 90vw;
            max-width: 1200px;
        }
        .table-hover tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        table.dataTable {
            width: 100% !important;
        }
        .table {
            font-size: 1.15rem;
        }
        .btn-pdf {
            padding: 0.3rem 0.6rem;
        }
    </style>
</head>

<body>

<div class="card card-transparent shadow-lg">

    <!-- HEADER -->
    <div class="card-header bg-primary text-white">
        <h2 class="mb-0">
            <i class="fas fa-users me-2"></i>Recent Logins
        </h2>
    </div>

    <!-- BODY -->
    <div class="card-body p-0">
        <div class="table-responsive">
            <table id="loginsTable" class="table table-striped table-hover table-dark mb-0">
                <thead>
                <tr>
                    <th>User</th>
                    <th>Last Login</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>

                <!-- SERVER-SIDE RENDER (FIRST LOAD) -->
                <tbody>
                <tr th:each="log : ${logins}">
                    <td th:text="${log.username}"></td>
                    <td th:text="${#temporals.format(log.lastLogin, 'yyyy-MM-dd HH:mm:ss')}"></td>
                    <td class="text-center">
                        <button
                                class="btn btn-danger btn-sm btn-pdf export-pdf-btn"
                                th:data-username="${log.username}"
                                title="Export PDF">
                            <i class="fas fa-file-pdf"></i>
                        </button>
                    </td>
                </tr>
                </tbody>

            </table>
        </div>
    </div>

    <!-- FOOTER -->
    <div class="card-footer bg-transparent text-center">
        <a th:href="@{/}" class="btn btn-outline-light btn-lg">
            <i class="fas fa-home me-1"></i>Home
        </a>
    </div>

</div>

<!-- JS -->
<script th:inline="none" src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script th:inline="none" src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="none" src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script th:inline="none" src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script th:inline="none">
    document.addEventListener('DOMContentLoaded', function () {

        const table = $('#loginsTable').DataTable({
            pageLength: 10,
            lengthChange: false,
            ordering: false,
            autoWidth: false,
            dom: 'ft<"mt-3"p>'
        });

        // 🔁 AUTO REFRESH EVERY 30s
        setInterval(() => {
            fetch('/api/logins')
                .then(res => res.json())
                .then(data => {
                    table.clear();
                    data.forEach(log => {
                        table.row.add([
                            log.username,
                            new Date(log.lastLogin).toLocaleString(),
                            `<button class="btn btn-danger btn-sm btn-pdf export-pdf-btn"
                                     data-username="${log.username}"
                                     title="Export PDF">
                                 <i class="fas fa-file-pdf"></i>
                             </button>`
                        ]);
                    });
                    table.draw(false);
                });
        }, 30000);

        // ✅ DELEGATED CLICK HANDLER (WORKS AFTER REFRESH)
        $('#loginsTable').on('click', '.export-pdf-btn', function () {
            const username = this.dataset.username;
            window.location.href =
                `/api/logins/${encodeURIComponent(username)}/export/pdf`;
        });

    });
</script>

</body>
</html>
